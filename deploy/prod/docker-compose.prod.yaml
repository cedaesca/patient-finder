name: patient-finder

services:
  migrate:
    image: registry.lupicrm.com/cedaesca/patient-finder:${API_IMAGE_TAG:-latest}
    restart: "no"
    env_file:
      - .env
    entrypoint:
      - sh
      - -c
      - /app/goose -dir /app/migrations postgres "$$DATABASE_URL" up
    depends_on:
      psql:
        condition: service_healthy

  api:
    image: registry.lupicrm.com/cedaesca/patient-finder:${API_IMAGE_TAG:-latest}
    container_name: patient-finder-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: production
      PORT: 8080
      DB_HOST: psql
      DB_PORT: 5432
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      TYPESENSE_HOST: typesense
      TYPESENSE_PORT: 8108
    depends_on:
      psql:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      typesense:
        condition: service_healthy
      otel-collector:
        condition: service_started
    networks:
      - default
      - proxy

  import:
    image: registry.lupicrm.com/cedaesca/patient-finder:${API_IMAGE_TAG:-latest}
    restart: "no"
    env_file:
      - .env
    entrypoint: ["/app/import"]
    depends_on:
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./pacientes.xlsx:/app/pacientes.xlsx:ro

  psql:
    image: postgres:18.3-alpine3.23
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - psql_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  typesense:
    image: typesense/typesense:30.1
    restart: unless-stopped
    command: >
      --data-dir /data
      --api-key ${TYPESENSE_API_KEY}
      --enable-cors
    volumes:
      - typesense_data:/data
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/8108"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  otel-collector:
    image: otel/opentelemetry-collector:0.105.0
    restart: unless-stopped
    environment:
      NEW_RELIC_API_KEY: ${NEW_RELIC_API_KEY}
      NEW_RELIC_OTLP_ENDPOINT: ${NEW_RELIC_OTLP_ENDPOINT}
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol/config.yaml:ro

volumes:
  psql_data:
  typesense_data:

networks:
  proxy:
    external: true
    name: proxy
